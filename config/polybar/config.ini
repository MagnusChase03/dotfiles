[global/wm]
include-file = $HOME/.config/polybar/colors.ini

[colors]
background = ${colors.base}
background-alt = ${colors.crust}
foreground = ${colors.text}
primary = ${colors.lavender}
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 30pt
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

font-0 = firacodenerdfont:size=14;2

border-size = 4
line-size = 3

modules-left = date
modules-center = bspwm
modules-right = pulseaudio wlan battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/bspwm]
type = internal/bspwm

label-active = Ó©Ī
label-active-underline= ${colors.primary}
label-active-background = ${colors.background-alt}
label-active-padding = 1

label-occupied = Ó™ľ
label-occupied-padding = 1

label-urgent = Ó™ľ
label-urgent-padding = 1

label-empty = Ó™ľ
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

label-volume = ÔÄß %percentage%%
label-volume-padding = 1

format-muted = <label-muted>
format-muted-background = ${colors.background}

label-muted = ÔÄß 00%
label-muted-padding = 1
label-muted-foreground = ${colors.disabled}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected = Ôáę  %essid%
label-connected-padding = 1

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = ÓôĀ %date%
label-padding = 1
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
low-at = 5

battery = BAT1
adapter = ADP1

poll-interval = 5

label-charging = ůįāä %percentage%%
label-charging-padding = 1

label-discharging = ůįāĀ %percentage%%
label-discharging-padding = 1

[settings]
screenchange-reload = true

; vim:ft=dosini
