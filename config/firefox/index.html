<html>

    <head>
        <title>Welcome MagnusChase03</title>

        <style>
            html {
                background-image: url("../../Pictures/wallpaper.jpg"); 
                background-size: 100% 100%;
            }
            html, body {
                margin: 0px;
                height: 100%;
                
                color: white;
                font-family: "Roboto", "firacode nerd font";
            }
            body {
                margin-top: -20px;
            }
            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
            }
            .card {
                display: flex;
                flex-direction: column;
                width: 50%;
                left: 25%;
                align-items: center;
                justify-content: center;
            }
            .flex {
                display: flex;
                justify-content: center;
                width: 100%;
            }
            .item {
                width: 100%;
                text-align: center;
            }
            .profile-icon {
                min-width: 300px;
                width: 300px;
                height: 300px;
                overflow: hidden;
                border-radius: 100%;
                margin: 10px;
            }
            .icon {
                width: 300px;
            }
            h1,p {
                width: 100%;
                text-align: left;
            }
            hr {
                width: 100%;
                border: 1px solid white;
                margin-bottom: 20px;
            }
            li {
                margin-bottom: 10px;
            }
            a, a:after, a:link, a:active {
                color: white;
                text-decoration: none;
                font-weight: bold;
            }
        </style>

    </head>

    <body>
        <div class="container">
            <div class="card">
                <div class="flex">
                    <div class="profile-icon">
                        <img class="icon" src="../../Pictures/pfp.jpg"/>
                    </div>
                    <div class="container">
                        <h1 id="time"></h1>
                        <h1>Welcome MagnusChase03</h1>
                        <p id="date"></p>
                    </div>
                </div>
                <hr>
                <div class="flex">
                    <div class="item">
                        <li><a href="https://github.com">Github</a></li>
                        <li><a href="https://archlinux.org">ArchWiki</a></li>
                        <li><a href="https://nixos.org">NixOS</a></li>
                    </div> 
                    <div class="item">
                        <li><a href="https://news.ycombinator.com">Hacker News</a></li>
                        <li><a href="https://www.dailycodingproblem.com/">Daily Coding Problem</a></li>
                    </div> 
                </div>
            </div>
        </div>

        <script>
            function update_time() {
                let date = new Date();

                let date_ele = document.getElementById("date");
                let time_ele = document.getElementById("time");
                date_ele.textContent = date.toDateString();

                let time = date.toLocaleTimeString().split(":");
                time[time.length - 2] += " " + time[time.length - 1].split(" ")[1];
                time.pop(time.length - 1);
                time_ele.textContent = time.join(":");
            }

            update_time();
            setInterval(() => {
                update_time();
            }, 60000);
        </script>
    </body>

</html>
